name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install cibuildwheel
      run: python -m pip install cibuildwheel setuptools pybind11
    - name: Build wheels with cibuildwheel
      run: |
        cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "${{ matrix.python-version }}-manylinux_x86_64"
        CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
        CIBW_TEST_SKIP: "*"
        CIBW_ARCHS: "x86_64"

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels
        path: wheelhouse/*.whl

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine 

  upload-testpypi:
    needs: build-and-publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: wheels
        path: dist
    - name: Publish to Test PyPI
      run: |
        python -m pip install twine
        twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
